<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Animation Practice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <!-- Cursor -->
    <div class="cursor">
      <div class="cursor-inner">
        <span class="crosshair"></span>
      </div>
    </div>
    <!-- Flickering Text -->
    <div class="text-flicker-container">
      <div class="text-flicker-word">
        <span>F</span>
        <span>L</span>
        <span>I</span>
        <span>C</span>
        <span>K</span>
        <span>E</span>
        <span>R</span>
        <span>I</span>
        <span>N</span>
        <span>G</span>
      </div>
      <div class="text-flicker-word">
        <span>T</span>
        <span>E</span>
        <span>X</span>
        <span>T</span>
      </div>
    </div>
  </main>

  <script src="index.js"></script>
</body>
</html>
